name: Build Geode Mod (Windows only)

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          platform: Windows
          target: Windows

  package:
    name: Package builds
    runs-on: windows-latest
    needs: ['build']

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}
